<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Paris Japon Solutions</title>
    <meta name="description" content="France × Japan Business Consulting">

    <!-- 🎯 AUTO REDIRECT JS -->
    <script>
        (function () {
            const lang = navigator.language || navigator.userLanguage;

            if (lang.startsWith("fr")) {
                window.location.replace("fr/index.html");
            } else if (lang.startsWith("ja")) {
                window.location.replace("jp/index.html");
            } else {
                // défaut anglais ou international
                window.location.replace("fr/index.html");
            }
        })();
    </script>

</head>

<body>

<!-- fallback si JS désactivé -->
<noscript>
    <p>JavaScript is disabled.</p>
    <a href="fr/index.html">🇫🇷 Français</a><br>
    <a href="jp/index.html">🇯🇵 日本語</a>
</noscript>

</body>
</html>
